## Filenymous v2 — Docker Compose (sans bridge centralisé)
##
## Services:
##   kitsune2   — kitsune2-bootstrap-srv --features sbd
##                Gère bootstrap (peer discovery) ET signal WebRTC (SBD)
##                sur un seul port 443 avec TLS intégré.
##                Source: https://github.com/holochain/kitsune2
##
## Architecture v2 (plus de bridge) :
##   ┌─ bootstrap.filenymous.eu:443 ─┐
##   │  kitsune2-bootstrap-srv (TLS)   │  ← agents se connectent directement
##   │  • HTTPS  → peer discovery      │
##   │  • WSS    → WebRTC signaling    │
##   └────────────────────────────────┘
##
##   Les notifications (email/SMS) sont supprimées.
##   La livraison se fait via :
##     - Mode A : send_remote_signal Holochain (agent en ligne)
##     - Mode B : lien partagé manuellement (fragment # hors-bande)
##   Le Web Bridge HTTP est géré par l'infrastructure Holo Host — pas ici.
##
## Démarrage prod :
##   docker compose --profile prod up -d
##
## Démarrage dev (sans TLS) :
##   docker compose --profile dev up -d
##   # kitsune2 sur http://localhost:8787

name: filenymous

networks:
  filenymous:
    driver: bridge

volumes:
  kitsune2-certs:   # monter de vrais certs ici en prod (certbot / Let's Encrypt)

services:

  # ── 1. kitsune2 prod — bootstrap + SBD signal (TLS intégré) ────────────────
  kitsune2:
    build:
      context: .
      dockerfile: network/kitsune2/Dockerfile
    image: ghcr.io/filenymous/filenymous-kitsune2:latest
    restart: unless-stopped
    networks: [filenymous]
    environment:
      RUST_LOG: info
    volumes:
      - kitsune2-certs:/etc/kitsune2:ro
    ports:
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    profiles: [prod]

  # ── 1b. kitsune2 dev — sans TLS, port 8787 ─────────────────────────────────
  kitsune2-dev:
    build:
      context: .
      dockerfile: network/kitsune2/Dockerfile
    image: ghcr.io/filenymous/filenymous-kitsune2:latest
    restart: unless-stopped
    networks: [filenymous]
    environment:
      RUST_LOG: debug
    command: ["kitsune2-bootstrap-srv", "--listen", "[::]:8787"]
    ports:
      - "8787:8787"
    profiles: [dev]
