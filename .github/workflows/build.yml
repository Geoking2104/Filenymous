name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Rust / Holochain DNA ────────────────────────────────────────────────────
  rust:
    name: Rust & DNA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: cachix/cachix-action@v14
        with:
          name: holochain-ci
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN || '' }}

      - name: Install Holochain toolchain (via Nix)
        run: |
          nix develop -L --command bash -lc '
            set -euo pipefail
            holochain --version
            hc --version
            cargo --version
            rustc --version
            node --version
            make --version | head -n 1
          '

      - name: Check Rust formatting
        run: nix develop -L --command cargo fmt --all -- --check

      - name: Check WASM workspace
        run: nix develop -L --command cargo check --workspace --target wasm32-unknown-unknown --message-format short

      - name: Compile WASM zomes
        run: nix develop -L --command make build-wasm

      - name: Pack DNA
        run: nix develop -L --command make build-dna

      - name: Pack hApp
        run: nix develop -L --command make build-happ

      - name: Upload hApp artifact
        uses: actions/upload-artifact@v4
        with:
          name: filenymous-happ
          path: workdir/filenymous.happ
          retention-days: 7

  # Holochain 0.6 replaces JS Tryorama with Rust Sweettest.
  # Keep the browser-only transfer path covered while Sweettest migration is planned.
  web-tests:
    name: Web/P2P tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Install signaling relay dependencies
        run: npm ci
        working-directory: p2p-signal

      - name: Run standalone web tests
        run: >
          npx vitest run
          src/p2p_direct.test.ts
          src/p2p_signal_relay.test.ts
          src/p2p_signal_hardening.test.ts
          src/p2p_signal_server.test.ts
          src/static_room_demo.test.ts
          src/web_mode_standalone.test.ts
        working-directory: tests

  # ── UI single-file HTML → ui.zip ─────────────────────────────────────────────
  # L'UI est filenymous-app.html (standalone, pas de build step Vite).
  # Holochain Launcher + Holo Host attendent index.html à la racine du zip.
  ui:
    name: UI zip
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package single-file HTML as ui.zip
        run: |
          mkdir -p workdir
          cp filenymous-app.html /tmp/index.html
          cd /tmp && zip -j $GITHUB_WORKSPACE/workdir/ui.zip index.html
          echo "ui.zip: $(wc -c < $GITHUB_WORKSPACE/workdir/ui.zip) bytes"

      - name: Upload UI zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: filenymous-ui-zip
          path: workdir/ui.zip
          retention-days: 7

  # ── .webhapp bundle (M4) ─────────────────────────────────────────────────────
  webhapp:
    name: .webhapp bundle
    needs: [rust, ui]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: cachix/cachix-action@v14
        with:
          name: holochain-ci
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN || '' }}

      - name: Download hApp artifact
        uses: actions/download-artifact@v4
        with:
          name: filenymous-happ
          path: workdir

      - name: Download UI zip artifact
        uses: actions/download-artifact@v4
        with:
          name: filenymous-ui-zip
          path: workdir

      - name: Pack .webhapp
        run: nix develop --command hc web-app pack . -o workdir/filenymous.webhapp

      - name: Upload .webhapp artifact
        uses: actions/upload-artifact@v4
        with:
          name: filenymous-webhapp
          path: workdir/filenymous.webhapp
          retention-days: 7
