name: Publish demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/demo/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Publish docs/demo to gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy static site to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tmp="$(mktemp -d)"
          git fetch origin gh-pages
          git worktree add -B gh-pages "$tmp" origin/gh-pages

          find "$tmp" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R docs/demo/. "$tmp/"
          touch "$tmp/.nojekyll"

          git -C "$tmp" add -A
          if git -C "$tmp" diff --cached --quiet; then
            echo "No GitHub Pages changes to publish."
            exit 0
          fi

          git -C "$tmp" commit -m "Deploy GitHub Pages from main"
          git -C "$tmp" push origin gh-pages
