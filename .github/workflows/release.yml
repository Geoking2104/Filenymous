name: Filenymous Web Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  web-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Package web app assets
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path.cwd()
          workdir = root / "workdir"
          workdir.mkdir(exist_ok=True)
          app_html = (root / "docs" / "demo" / "index.html").read_text(encoding="utf-8")

          def write_zip(zip_name, files):
              with ZipFile(workdir / zip_name, "w", ZIP_DEFLATED) as archive:
                  for arcname, content in files.items():
                      archive.writestr(arcname, content)

          write_zip("ui.zip", {
              "index.html": (root / "filenymous-app.html").read_text(encoding="utf-8"),
          })
          write_zip("filenymous-public-web.zip", {
              "filenymous-public-web.html": app_html,
          })

          for platform in ("windows", "macos", "linux"):
              folder = f"filenymous-{platform}"
              readme = f"""Filenymous {platform}

          Application web P2P portable, sans installateur natif et sans conducteur Holochain local obligatoire.
          Ouvrez Filenymous.html dans un navigateur moderne.

          Version en ligne:
          - OVH: https://filenymous.eu/
          - GitHub Pages: https://geoking2104.github.io/Filenymous/
          """
              write_zip(f"filenymous-{platform}-web.zip", {
                  f"{folder}/Filenymous.html": app_html,
                  f"{folder}/README.txt": readme,
              })
          PY

          ls -lh workdir/*.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Filenymous ${{ github.ref_name }}"
          body: |
            ## Filenymous ${{ github.ref_name }}

            Filenymous est maintenant publie comme application web P2P, sans installateur natif.

            ### Version web
            - OVH : https://filenymous.eu/
            - GitHub Pages : https://geoking2104.github.io/Filenymous/

            ### Telechargements
            - **Web public** : `filenymous-public-web.zip`
            - **Windows web portable** : `filenymous-windows-web.zip`
            - **macOS web portable** : `filenymous-macos-web.zip`
            - **Linux web portable** : `filenymous-linux-web.zip`

            Ces archives contiennent la meme application web et s'ouvrent dans un navigateur moderne. Elles ne contiennent pas de `.exe`, `.dmg`, `.AppImage` ni de conducteur Holochain local.

            ### P2P et securite
            - Envoi et reception sans compte.
            - Code a usage unique, lien chiffre autonome ou WebRTC direct.
            - Chiffrement local AES-256-GCM dans le navigateur.
            - Les cles privees, seeds wallet et historiques restent locaux.
            - Holochain / Holo Web Conductor et Iroh restent des modules avances de coordination ou de transport, pas des pre-requis d'installation.
          files: workdir/*.zip
          draft: false
          prerelease: false
