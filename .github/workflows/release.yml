name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Build release artifacts ──────────────────────────────────────────────────
  build:
    name: Build hApp
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: cachix/cachix-action@v14
        with:
          name: holochain-ci
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN || '' }}

      - name: Build hApp (WASM zomes + DNA + hApp pack)
        run: nix develop --command make build-happ

      - name: Copy demo UI into release folder
        run: |
          cp workdir/filenymous.happ filenymous.happ
          cp demo/index.html         filenymous-demo.html

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Filenymous ${{ github.ref_name }}
          body: |
            ## Filenymous ${{ github.ref_name }}

            ### Release artifacts

            | File | Usage |
            |------|-------|
            | `filenymous.happ` | Install in Holochain Launcher or run headless |
            | `filenymous-demo.html` | Open in any browser — standalone demo UI (no install needed) |

            ### Install via Holochain Launcher

            1. Download [Holochain Launcher](https://github.com/holochain/launcher/releases)
            2. Open Launcher → **Install hApp from filesystem**
            3. Select `filenymous.happ`

            ### Try the demo UI instantly

            Open `filenymous-demo.html` in your browser — no installation required.
            Live version: https://geoking2104.github.io/Filenymous/

            ### Headless deployment

            ```bash
            holochain -c conductor-config.prod.yaml
            hc app install --app-id filenymous filenymous.happ
            ```

            Bootstrap server: `https://dev-test-bootstrap2.holochain.org`
          files: |
            filenymous.happ
            filenymous-demo.html
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
