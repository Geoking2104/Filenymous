name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build hApp
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain with wasm32 target ───────────────────────────────────
      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Install hc CLI from Holochain prebuilt release ───────────────────────
      - name: Install hc CLI
        run: |
          HC_TAG="holochain-0.6.1-rc.7"
          curl -fsSL \
            "https://github.com/holochain/holochain/releases/download/${HC_TAG}/hc-x86_64-unknown-linux-gnu" \
            -o hc
          chmod +x hc
          sudo mv hc /usr/local/bin/hc
          hc --version

      # ── Build WASM zomes ────────────────────────────────────────────────────
      - name: Build WASM zomes
        run: cargo build --release --target wasm32-unknown-unknown

      # ── Pack DNA + hApp ─────────────────────────────────────────────────────
      - name: Pack DNA
        run: |
          mkdir -p workdir
          hc dna pack dnas/filenymous -o workdir/filenymous.dna

      - name: Pack hApp
        run: hc app pack . -o workdir/filenymous.happ

      # ── Add demo UI to release ───────────────────────────────────────────────
      - name: Prepare release artifacts
        run: |
          cp workdir/filenymous.happ filenymous.happ
          cp demo/index.html         filenymous-demo.html

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Filenymous ${{ github.ref_name }}
          body: |
            ## Filenymous ${{ github.ref_name }}

            ### Release artifacts

            | File | Usage |
            |------|-------|
            | `filenymous.happ` | Install in Holochain Launcher |
            | `filenymous-demo.html` | Open in any browser — standalone demo (no install needed) |

            ### Install via Holochain Launcher

            1. Download [Holochain Launcher](https://github.com/holochain/launcher/releases)
            2. Open Launcher → **Install hApp from filesystem**
            3. Select `filenymous.happ`

            ### Demo UI (browser only)

            Open `filenymous-demo.html` in your browser — no installation required.
            Live version: https://geoking2104.github.io/Filenymous/

            ### Bootstrap server

            `https://dev-test-bootstrap2.holochain.org` (Holochain public test server)
          files: |
            filenymous.happ
            filenymous-demo.html
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
