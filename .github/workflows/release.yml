name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Build release artifacts ──────────────────────────────────────────────────
  build:
    name: Build hApp + UI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: cachix/cachix-action@v14
        with:
          name: holochain-ci
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN || '' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build .webhapp (hApp + UI — M4)
        run: nix develop --command make build-webhapp
        env:
          VITE_HC_URL: ws://localhost:8888
          VITE_BRIDGE_URL: http://localhost:3001
          VITE_BRIDGE_SECRET: replace-in-deployment

      - name: Copy artefacts to root for upload
        run: |
          cp workdir/filenymous.happ    filenymous.happ
          cp workdir/filenymous.webhapp filenymous.webhapp

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Filenymous ${{ github.ref_name }}
          body: |
            ## Filenymous ${{ github.ref_name }}

            ### Artefacts

            | Fichier | Usage |
            |---------|-------|
            | `filenymous.webhapp` | **Installation directe dans Holochain Launcher** (recommandé) |
            | `filenymous.happ` | Pour déploiement headless sur un conducteur Holochain existant |

            ### Installation via Holochain Launcher (M4)

            1. Télécharger [Holochain Launcher](https://github.com/holochain/launcher/releases)
            2. Ouvrir le Launcher → **Install hApp from filesystem**
            3. Sélectionner `filenymous.webhapp`
            4. Lancer le bridge de notification (optionnel pour les notifications email/SMS) :
               ```bash
               cd bridge && cp .env.example .env && npm start
               ```

            ### Déploiement headless (sans Launcher)

            ```bash
            holochain -c conductor-config.yaml
            hc app install --app-id filenymous filenymous.happ
            cd bridge && cp .env.example .env && npm start
            ```

            Voir [CONTRIBUTING.md](CONTRIBUTING.md) pour la configuration complète.
          files: |
            filenymous.webhapp
            filenymous.happ
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
