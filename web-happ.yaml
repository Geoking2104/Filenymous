---
manifest_version: "0"

name: filenymous
description: "Peer-to-peer encrypted file transfer on Holochain — no central server, no account required"

ui:
  # The UI zip is produced by `make build-ui` :
  #   filenymous-app.html → index.html → workdir/ui.zip
  # Single-file standalone HTML — no build step required.
  path: "./workdir/ui.zip"

happ:
  path: "./workdir/filenymous.happ"
