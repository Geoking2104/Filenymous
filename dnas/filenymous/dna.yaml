---
manifest_version: "0"
name: filenymous
integrity:
  # M5: stable network_seed — all public nodes join the same DHT network.
  # Change this value to create an isolated test network (e.g., for staging).
  # WARNING: changing this in production creates a network fork.
  network_seed: "filenymous-mainnet-v1"
  properties: ~
  zomes:
    - name: identity_integrity
      bundled: "../../target/wasm32-unknown-unknown/release/identity_integrity.wasm"
    - name: transfer_integrity
      bundled: "../../target/wasm32-unknown-unknown/release/transfer_integrity.wasm"
    - name: storage_integrity
      bundled: "../../target/wasm32-unknown-unknown/release/storage_integrity.wasm"
coordinator:
  zomes:
    - name: identity
      bundled: "../../target/wasm32-unknown-unknown/release/identity.wasm"
      dependencies:
        - name: identity_integrity
    - name: transfer
      bundled: "../../target/wasm32-unknown-unknown/release/transfer.wasm"
      dependencies:
        - name: transfer_integrity
        - name: identity_integrity
    - name: storage
      bundled: "../../target/wasm32-unknown-unknown/release/storage.wasm"
      dependencies:
        - name: storage_integrity
        - name: transfer_integrity
