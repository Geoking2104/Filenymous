---
manifest_version: "0"
name: filenymous
integrity:
  # network_seed stable — tous les nœuds publics rejoignent le même réseau DHT.
  # Modifier pour créer un réseau de test isolé (staging).
  # ATTENTION : tout changement en prod crée un fork réseau.
  network_seed: "filenymous-mainnet-v2"
  properties: ~
  zomes:
    # ── Identité (custom) ───────────────────────────────────────────────────
    - name: identity_integrity
      path: "../../target/wasm32-unknown-unknown/release/identity_integrity.wasm"

    # Room/presence/chat/direct-transfer requests (custom)
    - name: room_integrity
      path: "../../target/wasm32-unknown-unknown/release/room_integrity.wasm"

    # ── Stockage fichiers (holochain-open-dev/file-storage) ─────────────────
    # Chunks publics sur DHT — accessibles via Holo Web Bridge (HTTP GET)
    - name: file_storage_integrity
      path: "../../target/wasm32-unknown-unknown/release/hc_zome_file_storage_integrity.wasm"

    # ── Delivery signals (ddd-mtl/delivery-zome) ────────────────────────────
    # Notifications privées agent-à-agent (remote_signal + PendingNotice DHT)
    - name: delivery_integrity
      path: "../../target/wasm32-unknown-unknown/release/zome_delivery_integrity.wasm"

    # ── Métadonnées transfert (custom) ──────────────────────────────────────
    # ParcelManifest, DownloadRecord, expiry, max_downloads
    - name: parcel_integrity
      path: "../../target/wasm32-unknown-unknown/release/parcel_integrity.wasm"

coordinator:
  zomes:
    # ── Identité ────────────────────────────────────────────────────────────
    - name: identity
      path: "../../target/wasm32-unknown-unknown/release/identity.wasm"
      dependencies:
        - name: identity_integrity

    - name: room
      path: "../../target/wasm32-unknown-unknown/release/room.wasm"
      dependencies:
        - name: room_integrity

    # ── File storage ─────────────────────────────────────────────────────────
    - name: file_storage
      path: "../../target/wasm32-unknown-unknown/release/hc_zome_file_storage_coordinator.wasm"
      dependencies:
        - name: file_storage_integrity

    # ── Delivery (signaux) ──────────────────────────────────────────────────
    - name: delivery
      path: "../../target/wasm32-unknown-unknown/release/delivery.wasm"
      dependencies:
        - name: delivery_integrity
        - name: file_storage_integrity

    # ── Parcel (orchestration Filenymous) ────────────────────────────────────
    - name: parcel
      path: "../../target/wasm32-unknown-unknown/release/parcel.wasm"
      dependencies:
        - name: parcel_integrity
        - name: identity_integrity
        - name: file_storage_integrity
        - name: delivery_integrity
